{% extends 'base.html' %}
{% block title %}Επεξεργασία Εσόδου{% endblock %}
{% block content %}
<h1 class="page-title"><i class="bi bi-pencil-fill text-success"></i> Επεξεργασία Εσόδου <small class="text-muted fs-6">#{{ row['id'] }}</small></h1>
<div class="card p-4" style="max-width:540px">
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Κατηγορία Εσόδου <span class="text-danger">*</span></label>
      <select name="category_id" class="form-select" required>
        {% for c in income_categories %}<option value="{{ c.id }}" {{ 'selected' if c.id==row['category_id'] }}>{{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Λογαριασμός <span class="text-danger">*</span></label>
      <select name="account_id" class="form-select" required>
        <option value="">— Επιλογή λογαριασμού —</option>
        {% for a in accounts %}<option value="{{ a.id }}" {{ 'selected' if a.id==row['account_id'] }}>{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Άτομο <span class="text-muted small">(προαιρετικό)</span></label>
      <select name="person_id" class="form-select">
        <option value="">— Χωρίς άτομο —</option>
        {% for p in persons %}<option value="{{ p.id }}" {{ 'selected' if p.id==row['person_id'] }}>{{ p.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Ημερομηνία <span class="text-danger">*</span></label>
      <input type="date" name="income_date" class="form-control" value="{{ row['income_date'] }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Ποσό (€) <span class="text-danger">*</span></label>
      <div class="input-group">
        <span class="input-group-text text-success">€</span>
        <input type="number" name="amount" class="form-control" step="0.01" min="0.01" value="{{ row['amount'] }}" required>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold">Σημειώσεις</label>
      <input type="text" name="notes" class="form-control" value="{{ row['notes'] or '' }}">
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-success"><i class="bi bi-check-lg me-1"></i>Αποθήκευση</button>
      <a href="{{ url_for('income') }}" class="btn btn-outline-secondary">Ακύρωση</a>
    </div>
  </form>
</div>
{% endblock %}
