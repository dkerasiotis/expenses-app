<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Σύνδεση — Οικιακά Έξοδα</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="icon" href="{{ url_for('favicon') }}" type="image/svg+xml">
  <style>
    body {
      background: linear-gradient(135deg, #1a2235 0%, #2d3f5e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    .login-card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,.3);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
    }
    .login-icon {
      width: 70px; height: 70px;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; color: #fff;
      margin: 0 auto 1.5rem;
      box-shadow: 0 8px 20px rgba(59,130,246,.4);
    }
    .form-control {
      border-radius: 10px;
      padding: .75rem 1rem;
      border: 2px solid #e2e8f0;
      font-size: 1rem;
    }
    .form-control:focus {
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59,130,246,.15);
    }
    .btn-login {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      border: none;
      border-radius: 10px;
      padding: .75rem;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      width: 100%;
      transition: opacity .2s;
    }
    .btn-login:hover { opacity: .9; color: #fff; }
    .error-box {
      background: #fef2f2;
      border: 1.5px solid #fecaca;
      border-radius: 10px;
      padding: .75rem 1rem;
      color: #dc2626;
      font-size: .9rem;
    }
    .input-icon { position: relative; }
    .input-icon .bi {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      color: #94a3b8; cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-icon">€</div>
    <h4 class="text-center fw-bold mb-1">Οικιακά Έξοδα</h4>
    <p class="text-center text-muted small mb-4">Εισάγετε τον κωδικό πρόσβασης</p>

    {% if error %}
    <div class="error-box mb-3">
      <i class="bi bi-exclamation-circle me-2"></i>{{ error }}
    </div>
    {% endif %}

    <form method="post">
      <div class="mb-4">
        <label class="form-label fw-semibold small text-muted">ΚΩΔΙΚΟΣ ΠΡΟΣΒΑΣΗΣ</label>
        <div class="input-icon">
          <input type="password" name="password" id="passwordInput"
                 class="form-control" placeholder="••••••••"
                 autocomplete="current-password" autofocus required>
          <i class="bi bi-eye" id="togglePwd" onclick="togglePassword()"></i>
        </div>
      </div>
      <button type="submit" class="btn-login">
        <i class="bi bi-box-arrow-in-right me-2"></i>Σύνδεση
      </button>
    </form>
  </div>

  <script>
  function togglePassword() {
    const inp = document.getElementById('passwordInput');
    const ico = document.getElementById('togglePwd');
    if (inp.type === 'password') {
      inp.type = 'text';
      ico.className = 'bi bi-eye-slash';
    } else {
      inp.type = 'password';
      ico.className = 'bi bi-eye';
    }
  }
  </script>
</body>
</html>
