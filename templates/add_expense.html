{% extends 'base.html' %}
{% block title %}Νέο Έξοδο{% endblock %}
{% block content %}
<h1 class="page-title"><i class="bi bi-dash-circle-fill text-danger"></i> Νέο Έξοδο</h1>
<div class="card p-4" style="max-width:540px">
  <form method="post">
    <div class="mb-3">
      <label class="form-label fw-semibold">Κατηγορία <span class="text-danger">*</span></label>
      <select name="category_id" class="form-select" required>
        <option value="">— Επιλογή κατηγορίας —</option>
        {% for c in categories %}<option value="{{ c.id }}">{{ c.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Λογαριασμός <span class="text-danger">*</span></label>
      <select name="account_id" class="form-select" required>
        <option value="">— Επιλογή λογαριασμού —</option>
        {% for a in accounts %}<option value="{{ a.id }}">{{ a.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Άτομο <span class="text-muted small">(προαιρετικό)</span></label>
      <select name="person_id" class="form-select">
        <option value="">— Χωρίς άτομο —</option>
        {% for p in persons %}<option value="{{ p.id }}">{{ p.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Ημερομηνία <span class="text-danger">*</span></label>
      <input type="date" name="expense_date" class="form-control" value="{{ today }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Ποσό (€) <span class="text-danger">*</span></label>
      <div class="input-group">
        <span class="input-group-text">€</span>
        <input type="number" name="amount" class="form-control" step="0.01" min="0.01" placeholder="0.00" required autofocus>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Σημειώσεις</label>
      <input type="text" name="notes" class="form-control" placeholder="Προαιρετικό...">
    </div>

    <!-- Pending toggle -->
    <div class="mb-4 p-3 rounded border" style="background:#fffbeb;border-color:#fde68a!important">
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" name="is_pending" id="isPending" value="1">
        <label class="form-check-label fw-semibold" for="isPending">
          <i class="bi bi-clock-fill text-warning me-1"></i>Εκκρεμής Πληρωμή
        </label>
      </div>
      <div class="form-text mt-1">Επιλέξτε αν η πληρωμή δεν έχει γίνει ακόμα. Θα εμφανιστεί στο Dashboard ως υπενθύμιση και <strong>δεν θα μετράει</strong> στα σύνολα μέχρι να την ολοκληρώσετε.</div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-danger"><i class="bi bi-check-lg me-1"></i>Καταχώρηση</button>
      <a href="{{ url_for('expenses') }}" class="btn btn-outline-secondary">Ακύρωση</a>
    </div>
  </form>
</div>
{% endblock %}
